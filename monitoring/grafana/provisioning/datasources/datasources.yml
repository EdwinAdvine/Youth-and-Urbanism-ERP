apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://urban-vibes-dynamics-prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: urban-vibes-dynamics-postgres:5432
    database: urban_vibes_dynamics
    user: urban
    secureJsonData:
      password: "${POSTGRES_PASSWORD:-urban_secret}"
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
    editable: false
