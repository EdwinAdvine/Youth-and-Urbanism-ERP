
networks:
  urban-erp-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  stalwart_data:

  onlyoffice_data:
  onlyoffice_logs:
  jitsi_web_config:
  jitsi_prosody_config:
  jitsi_prosody_plugins:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: urban-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urban_secret}
      POSTGRES_DB: ${POSTGRES_DB:-urban_erp}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urban} -d ${POSTGRES_DB:-urban_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - urban-erp-net

  redis:
    image: redis:7-alpine
    container_name: urban-erp-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urban-erp-net

  minio:
    image: minio/minio:latest
    container_name: urban-erp-minio
    restart: unless-stopped
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - urban-erp-net

  ollama:
    image: ollama/ollama:latest
    container_name: urban-erp-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - urban-erp-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urban-erp-backend
    restart: unless-stopped
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - urban-erp-net

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urban-erp-celery-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker -l info
    networks:
      - urban-erp-net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urban-erp-celery-beat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat -l info
    networks:
      - urban-erp-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: urban-erp-frontend
    restart: unless-stopped
    ports:
      - "3010:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_TARGET=http://backend:8000
      - VITE_WS_TARGET=ws://backend:8000
    networks:
      - urban-erp-net


  stalwart:
    image: stalwartlabs/mail-server:latest
    container_name: urban-erp-stalwart
    restart: unless-stopped
    ports:
      - "8082:8080"    # HTTP admin + JMAP
      - "1025:25"      # SMTP
      - "1587:587"     # SMTP submission
      - "1993:993"     # IMAPS
    environment:
      - STALWART_HOSTNAME=${MAIL_DOMAIN:-youthandurbanism.org}
    volumes:
      - stalwart_data:/opt/stalwart-mail
    networks:
      - urban-erp-net

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: urban-erp-onlyoffice
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-onlyoffice-jwt-secret-2026}
      - JWT_HEADER=Authorization
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    networks:
      - urban-erp-net

  jitsi-web:
    image: jitsi/web:stable
    container_name: urban-erp-jitsi-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:443"
      - "127.0.0.1:8085:80"
    environment:
      - PUBLIC_URL=https://localhost:8443
      - XMPP_SERVER=jitsi-prosody
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - TZ=UTC
    volumes:
      - jitsi_web_config:/config
    networks:
      - urban-erp-net

  jitsi-prosody:
    image: jitsi/prosody:stable
    container_name: urban-erp-jitsi-prosody
    restart: unless-stopped
    expose:
      - "5222"
      - "5269"
      - "5280"
      - "5347"
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jitsi-jicofo-secret}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jitsi-focus-password}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jitsi-jvb-password}
      - TZ=UTC
    volumes:
      - jitsi_prosody_config:/config
      - jitsi_prosody_plugins:/prosody-plugins-custom
    networks:
      urban-erp-net:
        aliases:
          - meet.jitsi
          - auth.meet.jitsi
          - muc.meet.jitsi
          - internal-muc.meet.jitsi
          - guest.meet.jitsi

  jitsi-jicofo:
    image: jitsi/jicofo:stable
    container_name: urban-erp-jitsi-jicofo
    restart: unless-stopped
    environment:
      - XMPP_SERVER=jitsi-prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET:-jitsi-jicofo-secret}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jitsi-focus-password}
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=UTC
    depends_on:
      - jitsi-prosody
    networks:
      - urban-erp-net

  jitsi-jvb:
    image: jitsi/jvb:stable
    container_name: urban-erp-jitsi-jvb
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    environment:
      - XMPP_SERVER=jitsi-prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jitsi-jvb-password}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=10000
      - JVB_TCP_HARVESTER_DISABLED=true
      - TZ=UTC
    depends_on:
      - jitsi-prosody
    networks:
      - urban-erp-net

