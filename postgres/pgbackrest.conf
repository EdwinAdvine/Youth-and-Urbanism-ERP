[global]
# ── Repository: MinIO (S3-compatible) ────────────────────────────────────────
repo1-type=s3
repo1-path=/pgbackrest
repo1-s3-endpoint=urban-vibes-dynamics-minio
repo1-s3-port=9000
repo1-s3-uri-style=path
repo1-s3-region=us-east-1
repo1-s3-bucket=urban-vibes-dynamics-pgbackrest
repo1-s3-key=${MINIO_ACCESS_KEY}
repo1-s3-key-secret=${MINIO_SECRET_KEY}
repo1-storage-verify-tls=n          # MinIO runs HTTP internally; disable TLS verify

# ── Encryption ────────────────────────────────────────────────────────────────
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=${PGBACKREST_CIPHER_PASS}

# ── Retention ────────────────────────────────────────────────────────────────
repo1-retention-full=4              # keep last 4 full backups (~4 weeks)
repo1-retention-diff=14             # keep last 14 differential backups (2 weeks)
repo1-retention-archive=90          # keep 90 days of WAL archive for PITR

# ── Logging ───────────────────────────────────────────────────────────────────
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# ── Process settings ─────────────────────────────────────────────────────────
process-max=2                       # parallel backup processes
compress-type=lz4                   # fast compression for WAL segments
compress-level=1                    # light compression (speed > ratio for WAL)

# ── Backup resume ─────────────────────────────────────────────────────────────
resume=y                            # resume interrupted backups automatically

[urban-vibes-dynamics]
# Stanza configuration — matches the cluster scope in patroni.yml
pg1-path=/var/lib/postgresql/data/pgdata
pg1-port=5432
pg1-user=postgres
pg1-socket-path=/var/run/postgresql
