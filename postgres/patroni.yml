# Patroni cluster configuration for Urban Vibes Dynamics HA PostgreSQL.
#
# Three-node synchronous replication: patroni1 (initial primary),
# patroni2 + patroni3 (sync standbys). etcd is used for DCS.
#
# Environment variables are substituted at runtime via ${VAR} syntax.
# PATRONI_NAME, PATRONI_POSTGRESQL_CONNECT_ADDRESS, PATRONI_RESTAPI_CONNECT_ADDRESS
# must be set per-container in docker-compose.yml.

scope: urban-vibes-dynamics-cluster
namespace: /db/
name: ${PATRONI_NAME}  # e.g., "patroni1", "patroni2", "patroni3"

# ── Distributed Configuration Store (etcd) ───────────────────────────────────
etcd3:
  hosts:
    - urban-vibes-dynamics-etcd:2379

# ── REST API (used by HAProxy health checks) ──────────────────────────────────
restapi:
  listen: 0.0.0.0:8008
  connect_address: ${PATRONI_RESTAPI_CONNECT_ADDRESS}  # e.g., patroni1:8008

# ── Bootstrap (only runs when cluster is first initialized) ──────────────────
bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 30
    maximum_lag_on_failover: 1048576  # 1 MB — nodes lagging more won't be promoted

    # Synchronous replication: primary waits for at least 1 replica to confirm WAL
    synchronous_mode: true
    synchronous_mode_strict: false  # false = allow async if no sync replicas available

    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        # ── Connections ─────────────────────────────────────────────────────
        max_connections: 200
        superuser_reserved_connections: 5

        # ── Memory ──────────────────────────────────────────────────────────
        shared_buffers: 256MB
        effective_cache_size: 768MB
        work_mem: 4MB
        maintenance_work_mem: 64MB

        # ── WAL & Replication ────────────────────────────────────────────────
        wal_level: replica
        wal_compression: "on"
        max_wal_senders: 10
        max_replication_slots: 10
        wal_keep_size: 1GB
        hot_standby: "on"
        hot_standby_feedback: "on"

        # ── Archive (pgBackRest) ─────────────────────────────────────────────
        archive_mode: "on"
        archive_command: >-
          pgbackrest --stanza=urban-vibes-dynamics archive-push %p
        archive_timeout: 60s  # force WAL switch every 60s for near-real-time PITR

        # ── Logging ──────────────────────────────────────────────────────────
        log_destination: stderr
        logging_collector: "off"
        log_min_duration_statement: 1000  # log queries >1s
        log_checkpoints: "on"
        log_connections: "off"
        log_disconnections: "off"
        log_line_prefix: "%t [%p]: user=%u,db=%d,app=%a,client=%h "
        log_lock_waits: "on"

        # ── Security ─────────────────────────────────────────────────────────
        password_encryption: scram-sha-256

        # ── Audit ────────────────────────────────────────────────────────────
        shared_preload_libraries: pgvector,pg_stat_statements,pgaudit

        # ── Performance ──────────────────────────────────────────────────────
        checkpoint_completion_target: 0.9
        default_statistics_target: 100
        random_page_cost: 1.1  # SSD-optimised

  # SQL run once after cluster initialization
  initdb:
    - encoding: UTF8
    - data-checksums  # enables CRC checksums on data pages — catches silent corruption

  pg_hba:
    - host replication replicator 0.0.0.0/0 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  users:
    urban:
      password: ${POSTGRES_PASSWORD}
      options:
        - createrole
        - createdb
    replicator:
      password: ${PATRONI_REPLICATION_PASSWORD}
      options:
        - replication

# ── PostgreSQL connection ─────────────────────────────────────────────────────
postgresql:
  listen: 0.0.0.0:5432
  connect_address: ${PATRONI_POSTGRESQL_CONNECT_ADDRESS}  # e.g., patroni1:5432

  data_dir: /var/lib/postgresql/data/pgdata
  bin_dir: /usr/lib/postgresql/16/bin
  pgpass: /tmp/pgpass

  authentication:
    replication:
      username: replicator
      password: ${PATRONI_REPLICATION_PASSWORD}
    superuser:
      username: postgres
      password: ${POSTGRES_PASSWORD}
    rewind:
      username: rewind_user
      password: ${POSTGRES_PASSWORD}

  parameters:
    # Node-level overrides (supplement the bootstrap DCS parameters above)
    unix_socket_directories: /var/run/postgresql

# ── Tags ─────────────────────────────────────────────────────────────────────
tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
