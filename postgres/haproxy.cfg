global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    tcp
    retries 3
    timeout connect  5s
    timeout client   30s
    timeout server   30s
    timeout check    2s

# ── Stats dashboard ───────────────────────────────────────────────────────────
frontend stats
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    stats auth admin:urban-haproxy-2026

# ── Write (Primary) endpoint — port 5000 ──────────────────────────────────────
# Routes all write traffic to the Patroni primary.
# Health check: GET /primary on Patroni REST API (port 8008).
# Patroni returns HTTP 200 for the primary, 503 for replicas.
frontend pg_write
    bind *:5000
    default_backend pg_primary

backend pg_primary
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    server patroni1 urban-erp-patroni1:5432 check port 8008
    server patroni2 urban-erp-patroni2:5432 check port 8008
    server patroni3 urban-erp-patroni3:5432 check port 8008

# ── Read (Replica) endpoint — port 5001 ───────────────────────────────────────
# Round-robins read traffic across all healthy replicas.
# Health check: GET /replica on Patroni REST API.
# Patroni returns HTTP 200 for replicas (and the primary if no replicas are up),
# ensuring reads never fail completely even after a failover.
frontend pg_read
    bind *:5001
    default_backend pg_replicas

backend pg_replicas
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    server patroni1 urban-erp-patroni1:5432 check port 8008
    server patroni2 urban-erp-patroni2:5432 check port 8008
    server patroni3 urban-erp-patroni3:5432 check port 8008
