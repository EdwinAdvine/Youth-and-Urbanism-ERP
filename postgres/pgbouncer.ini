# PgBouncer configuration for Urban Vibes Dynamics.
#
# Transaction-level pooling — safest mode for async frameworks (asyncpg).
# Clients connect to PgBouncer on port 6432; PgBouncer maintains a smaller
# pool of actual PostgreSQL connections and multiplexes them.
#
# Two logical databases are exposed:
#   urban_vibes_dynamics          → HAProxy:5000 (always the current primary)
#   urban_vibes_dynamics_readonly → HAProxy:5001 (read-replica round-robin)

[databases]
# Write connection — routes to HAProxy which resolves to Patroni primary.
urban_vibes_dynamics = host=urban-vibes-dynamics-haproxy port=5000 dbname=urban_vibes_dynamics auth_user=urban

# Read-only connection — routes to HAProxy which load-balances across replicas.
urban_vibes_dynamics_readonly = host=urban-vibes-dynamics-haproxy port=5001 dbname=urban_vibes_dynamics auth_user=urban

[pgbouncer]
# ── Network ──────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

# ── Auth ─────────────────────────────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

# ── Pooling mode ─────────────────────────────────────────────────────────────
# transaction — connection returned to pool after each transaction, not session.
# Required for asyncpg (which doesn't use server-side prepared statements by default).
pool_mode = transaction

# ── Pool sizing ───────────────────────────────────────────────────────────────
# default_pool_size: PostgreSQL connections per (database, user) pair.
# max_client_conn: total clients PgBouncer accepts simultaneously.
# Clients beyond default_pool_size queue until a connection is free.
default_pool_size = 30
max_client_conn = 400
reserve_pool_size = 10            # extra connections for reserve on burst
reserve_pool_timeout = 5          # seconds to wait before using reserve pool
max_db_connections = 80           # hard cap on backend connections to PG per database
min_pool_size = 5                 # keep at least 5 connections warm

# ── Timeouts ─────────────────────────────────────────────────────────────────
server_connect_timeout = 15
server_idle_timeout = 600         # close idle server connections after 10 min
client_idle_timeout = 300         # disconnect idle clients after 5 min
query_timeout = 0                 # 0 = no query timeout (rely on app-level timeouts)
query_wait_timeout = 120          # max seconds a query waits for a free connection

# ── TLS (client-facing) ───────────────────────────────────────────────────────
# Uncomment when TLS certs are generated (Phase 4)
# client_tls_sslmode = require
# client_tls_ca_file = /etc/pgbouncer/ssl/ca.crt
# client_tls_cert_file = /etc/pgbouncer/ssl/pgbouncer.crt
# client_tls_key_file = /etc/pgbouncer/ssl/pgbouncer.key

# ── Logging ───────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60                 # emit pool stats every 60 seconds

# ── Admin ─────────────────────────────────────────────────────────────────────
admin_users = postgres
stats_users = postgres, urban

# ── Misc ──────────────────────────────────────────────────────────────────────
server_reset_query = DISCARD ALL  # reset server connection state between clients
server_check_query = select 1
ignore_startup_parameters = extra_float_digits,search_path
